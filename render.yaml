services:
  - type: web
    name: ai-interview-api
    env: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-interview-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true

  - type: web
    name: ai-interview-web
    env: node
    rootDir: apps/web
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # Set this to https://<your-api-url> in the Render dashboard
      - key: NEXT_PUBLIC_WS_URL
        sync: false # Set this to wss://<your-api-url> in the Render dashboard

databases:
  - name: ai-interview-db
    databaseName: interview_db
    user: interview_user
    plan: free
