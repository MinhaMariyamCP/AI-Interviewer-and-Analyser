services:
  - type: web
    runtime: docker
    name: ai-interview-api
    region: singapore
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: ai-interview-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-interview-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false

  - type: web
    runtime: docker
    name: ai-interview-web
    region: singapore
    plan: free
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-interview-api-tamc.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://ai-interview-api-tamc.onrender.com

  - type: keyvalue
    name: ai-interview-redis
    region: singapore
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: ai-interview-db
    region: singapore
    plan: free
    databaseName: interview_db
    user: interview_user
    ipAllowList: []
